name: Build AX6000 fleth kmods

on:
  workflow_dispatch: {}

permissions:
  contents: write

env:
  # full SHA — the short rev is rebased out of openwrt-24.10 history, fetch by SHA
  IMMORTALWRT_COMMIT: "e4001192674e8d381233dab8755b133e42c71cc6"
  DEVICE: "xiaomi_redmi-router-ax6000-ubootmod"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-distutils python3-setuptools \
            rsync swig unzip zlib1g-dev file wget libelf-dev ccache

      - name: Clone ImmortalWrt at firmware commit (by full SHA)
        run: |
          git init src
          cd src
          git remote add origin https://github.com/immortalwrt/immortalwrt.git
          git fetch --depth 1 origin "$IMMORTALWRT_COMMIT"
          git checkout FETCH_HEAD
          echo "=== HEAD ==="; git log --oneline -1
          echo "=== kernel version ==="; grep -E 'LINUX_VERSION-6.6' include/kernel-6.6 || true

      - name: Update and install feeds
        run: |
          cd src
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure (device + fleth deps as modules)
        run: |
          cd src
          {
            echo "CONFIG_TARGET_mediatek=y"
            echo "CONFIG_TARGET_mediatek_filogic=y"
            echo "CONFIG_TARGET_mediatek_filogic_DEVICE_${DEVICE}=y"
            echo "CONFIG_PACKAGE_kmod-ip6-tunnel=m"
            echo "CONFIG_PACKAGE_kmod-iptunnel6=m"
            echo "CONFIG_PACKAGE_kmod-iptunnel4=m"
            echo "CONFIG_PACKAGE_kmod-iptunnel=m"
            echo "CONFIG_PACKAGE_kmod-nat46=m"
            echo "CONFIG_PACKAGE_map=m"
            echo "CONFIG_PACKAGE_ds-lite=m"
          } > .config
          # mtk_eth_soc.c references HNAT reset symbols; enable HNAT so the kernel builds.
          echo "CONFIG_NET_MEDIATEK_HNAT=y" >> target/linux/mediatek/filogic/config-6.6
          # ip6_tunnel.ko needs xfrm6_tunnel_register/deregister (xfrm6_tunnel.ko) and tunnel6;
          # these aren't OpenWrt packages, so enable them in the kernel config and harvest the .ko.
          echo "CONFIG_INET6_XFRM_TUNNEL=m" >> target/linux/mediatek/filogic/config-6.6
          echo "CONFIG_INET_XFRM_TUNNEL=m"  >> target/linux/mediatek/filogic/config-6.6
          echo "CONFIG_INET6_TUNNEL=m"      >> target/linux/mediatek/filogic/config-6.6
          echo "CONFIG_INET_TUNNEL=m"       >> target/linux/mediatek/filogic/config-6.6
          make defconfig
          echo "=== HNAT in resolved config? ==="
          grep -E 'CONFIG_NET_MEDIATEK_HNAT|CONFIG_NET_MEDIATEK_SOC_WED' .config build_dir/target-*/linux-*/linux-6.6.95/.config 2>/dev/null | head || true
          echo "=== selected check ==="
          grep -E 'CONFIG_PACKAGE_(kmod-ip6-tunnel|kmod-nat46|map|ds-lite)=' .config || true
          grep -E "DEVICE_${DEVICE}=y" .config || true

      - name: Download sources
        run: cd src && make -j$(nproc) download

      - name: Build
        run: |
          cd src
          make -j$(nproc) || (echo '=== retry verbose to surface error ==='; make -j1 V=s)

      - name: Collect raw .ko (ip6_tunnel + all load deps)
        run: |
          cd src
          KDIR=$(find build_dir -maxdepth 3 -type d -name 'linux-6.6.95' | head -1)
          echo "KDIR=$KDIR"
          mkdir -p ../out
          # ip6_tunnel and its transitive load-time deps (tunnel6/xfrm6_tunnel + ipv4 siblings)
          for ko in \
            net/ipv6/ip6_tunnel.ko net/ipv6/tunnel6.ko net/ipv6/xfrm6_tunnel.ko net/ipv6/ip6_udp_tunnel.ko \
            net/ipv4/tunnel4.ko net/ipv4/xfrm4_tunnel.ko ; do
            f="$KDIR/$ko"
            if [ -f "$f" ]; then cp -v "$f" ../out/; else echo "MISSING $ko"; fi
          done
          # nat46.ko (built under its own package dir)
          find build_dir -name 'nat46.ko' -exec cp -v {} ../out/ \; || true
          echo "=== collected ==="
          ls -la ../out
          test -f ../out/ip6_tunnel.ko || { echo 'ip6_tunnel.ko MISSING'; exit 1; }
          test -f ../out/xfrm6_tunnel.ko || { echo 'xfrm6_tunnel.ko MISSING (xfrm config not built)'; exit 1; }
          (cd ../out && sha256sum * > sha256sums)
          cat ../out/sha256sums

      - name: Publish kmods release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kmods
          name: "AX6000 fleth kmods (raw .ko, kernel 6.6.95)"
          body: |
            Raw kernel modules for ImmortalWrt @ e400119267 (kernel 6.6.95),
            xiaomi_redmi-router-ax6000-ubootmod. vermagic-matched, load via modprobe.
            Includes ip6_tunnel + tunnel6 + xfrm6_tunnel (+ ipv4 siblings) + nat46.
            Place in /lib/modules/6.6.95/ and modprobe ip6_tunnel.
          files: out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
