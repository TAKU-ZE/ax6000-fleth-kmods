name: Build AX6000 fleth kmods

on:
  workflow_dispatch: {}

permissions:
  contents: write

env:
  IMMORTALWRT_BRANCH: "openwrt-24.10"
  IMMORTALWRT_COMMIT: "e400119267"
  DEVICE: "xiaomi_redmi-router-ax6000-ubootmod"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-distutils python3-setuptools \
            rsync swig unzip zlib1g-dev file wget libelf-dev ccache

      - name: Clone ImmortalWrt at firmware commit
        run: |
          git clone --branch "$IMMORTALWRT_BRANCH" https://github.com/immortalwrt/immortalwrt.git src
          cd src
          git checkout "$IMMORTALWRT_COMMIT"
          echo "=== HEAD ==="; git log --oneline -1

      - name: Update and install feeds
        run: |
          cd src
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure (device + fleth deps as modules)
        run: |
          cd src
          {
            echo "CONFIG_TARGET_mediatek=y"
            echo "CONFIG_TARGET_mediatek_filogic=y"
            echo "CONFIG_TARGET_mediatek_filogic_DEVICE_${DEVICE}=y"
            echo "CONFIG_PACKAGE_kmod-ip6-tunnel=m"
            echo "CONFIG_PACKAGE_kmod-nat46=m"
            echo "CONFIG_PACKAGE_map=m"
            echo "CONFIG_PACKAGE_ds-lite=m"
          } > .config
          make defconfig
          echo "=== selected check ==="
          grep -E 'CONFIG_PACKAGE_(kmod-ip6-tunnel|kmod-nat46|map|ds-lite)=' .config || true
          grep -E "DEVICE_${DEVICE}=y" .config || true

      - name: Download sources
        run: cd src && make -j$(nproc) download

      - name: Build
        run: |
          cd src
          make -j$(nproc) || (echo '=== retry verbose to surface error ==='; make -j1 V=s)

      - name: Collect packages
        run: |
          cd src
          mkdir -p ../out
          for p in kmod-ip6-tunnel kmod-nat46 map ds-lite; do
            find bin -name "${p}*.ipk" -exec cp -v {} ../out/ \; || true
          done
          echo "=== kmods dir listing for reference ==="
          find bin -path '*kmods*' -name '*.ipk' | head -60 || true
          echo "=== collected ==="
          ls -la ../out
          test -n "$(ls -A ../out 2>/dev/null)" || { echo 'NO PACKAGES FOUND'; exit 1; }
          (cd ../out && sha256sum * > sha256sums)
          cat ../out/sha256sums

      - name: Publish kmods release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kmods
          name: "AX6000 fleth kmods (ip6-tunnel + nat46 + map + ds-lite)"
          body: |
            Built from ImmortalWrt @ e400119267 (kernel 6.6.95) for
            xiaomi_redmi-router-ax6000-ubootmod. Kernel-matched, opkg-installable.

            On the router:
            ```
            opkg install /tmp/kmod-ip6-tunnel*.ipk /tmp/kmod-nat46*.ipk /tmp/map*.ipk /tmp/ds-lite*.ipk
            ```
          files: out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
